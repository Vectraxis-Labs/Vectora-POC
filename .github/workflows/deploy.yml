name: Vectora CI/CD

on:
  push:
    branches:
      - main

jobs:

  # ── Job 1: Test ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and lint backend
        run: |
          pip install flake8
          cd server
          flake8 . --count --select=E9,F63,F7,F82 \
            --show-source --statistics \
            --exclude=.venv,venv,__pycache__

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and lint frontend
        run: |
          cd client
          npm install
          npm run lint

  # ── Job 2: Packer Build ───────────────────────────────────────
  packer-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Packer
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | \
            sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install -y packer
          packer --version

      - name: Packer Init
        working-directory: infra/packer
        run: packer init .

      - name: Packer Validate
        working-directory: infra/packer
        run: |
          packer validate \
            -var "do_token=${{ secrets.DO_TOKEN }}" \
            -var "github_repo=https://github.com/${{ github.repository }}.git" \
            vectora.pkr.hcl
          echo "✅ Packer config is valid"

      - name: Packer Build
        working-directory: infra/packer
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          echo "🔨 Building new snapshot — takes ~20 minutes..."
          packer build \
            -var "do_token=${{ secrets.DO_TOKEN }}" \
            -var "github_repo=https://github.com/${{ github.repository }}.git" \
            vectora.pkr.hcl
          echo "✅ Snapshot built successfully"

  # ── Job 3: Terraform Apply ────────────────────────────────────
  terraform-apply:
    runs-on: ubuntu-latest
    needs: packer-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | \
            sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install -y terraform
          terraform --version

      - name: Terraform Init
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
        run: |
          terraform validate
          echo "✅ Terraform config is valid"

      - name: Terraform Plan
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
        run: |
          terraform plan \
            -var "do_token=${{ secrets.DO_TOKEN }}" \
            -var "spaces_access_key=${{ secrets.SPACES_ACCESS_KEY }}" \
            -var "spaces_secret_key=${{ secrets.SPACES_SECRET_KEY }}" \
            -var "anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -out=tfplan
          echo "✅ Terraform plan created"

      - name: Terraform Apply
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
        run: |
          terraform apply -auto-approve tfplan
          echo "✅ Infrastructure updated"

  # ── Job 4: Deploy Code ────────────────────────────────────────
  deploy-code:
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -T 60 ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "❌ Server unreachable"
            exit 1
          fi
          echo "✅ Server fingerprint added"

      - name: Deploy to server
        run: |
          ssh root@${{ secrets.SERVER_IP }} << 'ENDSSH'
            echo "🚀 Starting deployment..."
            cd /app
            git pull origin main
            docker compose up -d --build
            echo "🎉 Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          echo "Waiting 30 seconds for containers to start..."
          sleep 30
          curl --fail http://${{ secrets.SERVER_IP }}/api/health || exit 1
          echo "✅ Deployment verified — API is healthy"